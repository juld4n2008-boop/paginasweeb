<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de CURP</title>
    <style>
        .contenedor-curp {
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        /* Estilo para que la imagen sea responsiva y se vea bien en móviles */
        .curp-img {
            max-width: 100%;
            height: auto;
            border: 1px solid #ccc;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="contenedor-curp">
        <img src="curp_julio_daniel.png" alt="Constancia CURP de Julio Daniel Gonzalez Martinez" class="curp-img">
    </div>

</body>
</html>
